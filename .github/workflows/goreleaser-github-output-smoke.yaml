# Validates the multiline $GITHUB_OUTPUT write used after GoReleaser in release.yaml.
# - GitHub: Actions → run workflow (workflow_dispatch).
# - Local: install act (brew install act), Docker running, then from repo root:
#     act workflow_dispatch -W .github/workflows/goreleaser-github-output-smoke.yaml -j smoke
name: Goreleaser GITHUB_OUTPUT smoke
on:
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test multiline GITHUB_OUTPUT write
        run: ./hack/ci/test-goreleaser-github-output.sh
